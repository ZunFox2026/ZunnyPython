<!DOCTYPE html>
<!-- Đây là file HTML demo cho bài CSS: "Tạo hình nền" -->
<html>
<head>
    <!-- Liên kết đến file CSS -->
    <link rel="stylesheet" type="text/css" href="Lesson0032.css">
    <!-- Thiết lập tiêu đề của trang web -->
    <title>Tạo hình nền</title>
</head>
<body>
    <!-- Tạo một div để chứa hình nền -->
    <div class="hinh-nen">
        <!-- Thêm nội dung để thử nghiệm với CSS -->
        <h1>Hình nền demo</h1>
        <p>Đây là một đoạn văn bản để thử nghiệm với CSS.</p>
        <p>Trang web này sẽ được thiết kế với hình nền đẹp.</p>
    </div>
    <!-- Tạo một div khác để chứa thêm nội dung -->
    <div class="noi-dung">
        <!-- Thêm nội dung để thử nghiệm với CSS -->
        <h2>Nội dung khác</h2>
        <p>Đây là một đoạn văn bản khác để thử nghiệm với CSS.</p>
        <p>Trang web này sẽ được thiết kế với nhiều nội dung khác nhau.</p>
    </div>
</body>
</html>
