<!DOCTYPE html>
<!-- Định nghĩa loại tài liệu là HTML5 -->
<html lang="vi">
<!-- Thiết lập ngôn ngữ của trang web là tiếng Việt -->
<head>
    <!-- Phần đầu của trang web, chứa thông tin về trang -->
    <meta charset="UTF-8">
    <!-- Định nghĩa bộ ký tự sử dụng trong trang web -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Định nghĩa cách trang web hiển thị trên các thiết bị di động -->
    <title>Tìm hiểu về Accessibility trong CSS</title>
    <!-- Tiêu đề của trang web -->
    <link rel="stylesheet" href="Lesson0008.css">
    <!-- Liên kết đến file CSS để áp dụng các phong cách cho trang web -->
</head>
<body>
    <!-- Phần nội dung của trang web -->
    <header>
        <!-- Phần đầu của trang web, thường chứa tiêu đề, logo, menu -->
        <h1>Trang chủ</h1>
        <!-- Tiêu đề chính của trang web -->
        <nav>
            <!-- Menu điều hướng của trang web -->
            <ul>
                <!-- Danh sách các mục trong menu -->
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Giới thiệu</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- Phần nội dung chính của trang web -->
        <section>
            <!-- Phần nội dung của trang web, thường chứa các bài viết, thông tin -->
            <h2>Giới thiệu về trang web</h2>
            <!-- Tiêu đề của phần nội dung -->
            <p>Đây là trang web demo về Accessibility trong CSS.</p>
            <!-- Đoạn văn bản trong phần nội dung -->
            <img src="image.jpg" alt="Hình ảnh demo">
            <!-- Hình ảnh trong phần nội dung, có thuộc tính alt để mô tả hình ảnh -->
        </section>
        <aside>
            <!-- Phần nội dung phụ của trang web, thường chứa các thông tin bổ sung -->
            <h3>Thông tin liên hệ</h3>
            <!-- Tiêu đề của phần nội dung phụ -->
            <p>Địa chỉ: 123 Nguyễn Văn Cừ, Q.1, TP.HCM</p>
            <p>Số điện thoại: 0909090909</p>
            <p>Email: demo@example.com</p>
        </aside>
    </main>
    <footer>
        <!-- Phần chân của trang web, thường chứa thông tin về bản quyền, thông tin liên hệ -->
        <p>&copy; 2024 Demo. All rights reserved.</p>
    </footer>
</body>
</html>
