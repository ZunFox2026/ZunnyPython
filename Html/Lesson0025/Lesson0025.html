<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Thẻ gốc của tài liệu HTML -->
<head>
    <!-- Thẻ chứa thông tin về tài liệu, không hiển thị trên trang -->
    <title>Tạo hiệu ứng loading</title>
    <!-- Tiêu đề của trang web -->
    <style>
        /* CSS cho hiệu ứng loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 10px solid #f3f3f3;
            border-top: 10px solid #3498db;
            border-radius: 50%;
            animation: loading 2s linear infinite;
        }
        @keyframes loading {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- Phần nội dung của trang web -->
    <div class="container">
        <h1>Hiệu ứng loading</h1>
        <div class="loading"></div>
        <!-- Hiệu ứng loading sẽ xuất hiện tại đây -->
    </div>
</body>
</html>
