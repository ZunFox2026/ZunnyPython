<!DOCTYPE html>
<!-- Định nghĩa loại tài liệu là HTML5 -->
<html>
<!-- Phần head chứa thông tin về trang web -->
<head>
    <!-- Thẻ tiêu đề của trang web -->
    <title>Trang Giới Thiệu</title>
    <!-- Liên kết đến stylesheet của trang web -->
    <style>
        /* CSS cho trang web */
        body {
            /* Cài đặt màu nền và font cho trang web */
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }
        
        /* CSS cho phần header */
        .header {
            /* Cài đặt màu nền và độ cao cho phần header */
            background-color: #007bff;
            height: 100px;
            /* Căn giữa nội dung trong phần header */
            text-align: center;
            /* Cài đặt màu cho chữ */
            color: #ffffff;
            /* Cài đặt padding cho phần header */
            padding: 20px;
        }
        
        /* CSS cho phần nội dung */
        .content {
            /* Cài đặt chiều rộng và độ cao cho phần nội dung */
            width: 80%;
            margin: 40px auto;
            /* Cài đặt màu nền cho phần nội dung */
            background-color: #ffffff;
            /* Cài đặt padding cho phần nội dung */
            padding: 20px;
            /* Cài đặt border cho phần nội dung */
            border: 1px solid #dddddd;
            /* Cài đặt bóng cho phần nội dung */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        /* CSS cho phần footer */
        .footer {
            /* Cài đặt màu nền và độ cao cho phần footer */
            background-color: #007bff;
            height: 50px;
            /* Căn giữa nội dung trong phần footer */
            text-align: center;
            /* Cài đặt màu cho chữ */
            color: #ffffff;
            /* Cài đặt padding cho phần footer */
            padding: 10px;
        }
    </style>
</head>
<!-- Phần body chứa nội dung của trang web -->
<body>
    <!-- Phần header của trang web -->
    <div class="header">
        <!-- Tiêu đề của trang web -->
        <h1>Trang Giới Thiệu</h1>
    </div>
    <!-- Phần nội dung của trang web -->
    <div class="content">
        <!-- Giới thiệu về trang web -->
        <h2>Chào mừng đến với trang giới thiệu của chúng tôi!</h2>
        <p>Trang web này được tạo ra để giới thiệu về các sản phẩm và dịch vụ của công ty chúng tôi.</p>
        <p>Chúng tôi hy vọng bạn sẽ tìm thấy thông tin hữu ích và thú vị trên trang web này.</p>
    </div>
    <!-- Phần footer của trang web -->
    <div class="footer">
        <!-- Thông tin về bản quyền của trang web -->
        <p>&copy; 2024 Công Ty XYZ</p>
    </div>
</body>
</html>
