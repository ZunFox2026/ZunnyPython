<!DOCTYPE html>
<html>
<head>
    <!-- Thẻ head chứa thông tin về trang web -->
    <title>Tạo hiệu ứng glow cho chữ</title>
    <style>
        /* CSS viết trong thẻ style */
        body {
            /* Thiết lập màu nền cho trang web */
            background-color: #f0f0f0;
        }
        .glow {
            /* Tạo hiệu ứng glow cho chữ */
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ff69b4;
        }
        .container {
            /* Thiết lập vị trí và màu nền cho container */
            width: 80%;
            margin: 40px auto;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- Thẻ body chứa nội dung của trang web -->
    <div class="container">
        <!-- Tạo container để chứa nội dung -->
        <h1 class="glow">Tạo hiệu ứng glow cho chữ</h1>
        <!-- Áp dụng hiệu ứng glow cho chữ -->
        <p>Đây là một ví dụ về tạo hiệu ứng glow cho chữ bằng sử dụng thuộc tính text-shadow trong CSS.</p>
    </div>
</body>
</html>
