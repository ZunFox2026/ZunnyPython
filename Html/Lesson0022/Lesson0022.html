<!DOCTYPE html>
<html>
<head>
    <!-- Phần này chứa thông tin về trang web, bao gồm cả CSS -->
    <title>Tạo hiệu ứng Glow</title>
    <style>
        /* Phần này chứa các định nghĩa CSS */
        body {
            /* Thiết lập màu nền và font cho trang web */
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .glow {
            /* Tạo hiệu ứng Glow cho phần tử */
            color: #ffffff;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ff69b4;
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
        }
        
        .box {
            /* Tạo hộp có hiệu ứng Glow */
            width: 200px;
            height: 200px;
            background-color: #000000;
            border: 1px solid #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ff69b4;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <!-- Phần này chứa nội dung của trang web -->
    <h1 style="text-align: center; color: #00698f;">Tạo hiệu ứng Glow</h1>
    <p class="glow">Ví dụ về hiệu ứng Glow trên văn bản</p>
    <div class="box"></div>
    <!-- Phần này minh họa hiệu ứng Glow trên một hộp -->
</body>
</html>
